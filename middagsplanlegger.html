<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F7F4EF; --sage: #4A6741; --sage-light: #EBF0E8; --sage-mid: #C5D4C0;
  --ink: #1E2218; --muted: #7A8070;
  --fish: #E8F0F7; --fish-text: #2A5275;
  --veg: #EBF0E8; --veg-text: #3A5C32;
  --freeze: #FDF3E3; --freeze-text: #7A4F0D;
  --border: rgba(74,103,65,0.18);
  --red: #C0392B; --red-light: #FDECEA;
}
body { font-family: "Roboto", sans-serif; background: var(--cream); color: var(--ink); }
.app { max-width: 760px; margin: 0 auto; padding: 0 0 4rem; }

.header { padding: 1.4rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
.header-text h1 { font-family: "Roboto Slab", serif; font-size: 22px; font-weight: 400; }
.header-text p { font-size: 12px; color: var(--muted); margin-top: 3px; }
.family-icons { display: flex; gap: 10px; margin-left: auto; }
.avatar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.avatar { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 2px solid white; box-shadow: 0 1px 5px rgba(0,0,0,0.15); }
.avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.avatar-label { font-size: 9px; color: var(--muted); font-weight: 500; }

.tabs { display: flex; padding: 0 1.5rem; border-bottom: 1px solid var(--border); }
.tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab.active { color: var(--sage); border-bottom-color: var(--sage); }
.tab:hover:not(.active) { color: var(--ink); }

.toolbar { padding: 1rem 1.5rem; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn-primary { background: var(--sage); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-family: "Roboto", sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.btn-primary:hover { opacity: 0.88; } .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: transparent; color: var(--sage); border: 1px solid var(--sage-mid); padding: 8px 16px; border-radius: 6px; font-family: "Roboto", sans-serif; font-size: 13px; cursor: pointer; }
.btn-secondary:hover { background: var(--sage-light); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid #EBCAC8; padding: 6px 12px; border-radius: 6px; font-family: "Roboto", sans-serif; font-size: 12px; cursor: pointer; }
.btn-danger:hover { background: var(--red-light); }
.btn-icon { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; color: var(--muted); cursor: pointer; font-family: "Roboto", sans-serif; }
.btn-icon:hover { background: var(--sage-light); color: var(--sage); border-color: var(--sage-mid); }

.fridge-bar { margin: 0 1.5rem 0.75rem; background: var(--sage-light); border-radius: 8px; padding: 9px 13px; font-size: 12px; color: var(--sage); display: flex; align-items: center; gap: 8px; }
.fridge-bar input { flex: 1; border: none; background: transparent; font-family: "Roboto", sans-serif; font-size: 12px; color: var(--ink); outline: none; }

/* WEEK GRID */
.week-grid { padding: 0 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(185px, 1fr)); gap: 10px; }
.day-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 13px; transition: box-shadow 0.15s; }
.day-card:hover { box-shadow: 0 2px 10px rgba(74,103,65,0.1); }
.day-card.today { border-color: var(--sage); border-width: 1.5px; }
.day-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.day-name { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 5px; }
.today-dot { width: 6px; height: 6px; background: var(--sage); border-radius: 50%; display: inline-block; }
.day-date { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 300; }
.presence-row { display: flex; gap: 4px; }
.presence-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; overflow: hidden; padding: 0; transition: all 0.15s; }
.presence-btn img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.presence-btn.away { opacity: 0.25; filter: grayscale(1); }
.presence-btn.present { border-color: var(--sage-mid); }
.meal-section { margin-bottom: 10px; }
.meal-section-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
.meal-avatar-small { width: 16px; height: 16px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
.meal-avatar-small img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.meal-name { font-family: "Roboto Slab", serif; font-size: 14px; font-weight: 400; line-height: 1.4; margin-bottom: 5px; }
.meal-name-kid { font-family: "Roboto Slab", serif; font-size: 13px; font-weight: 400; line-height: 1.35; margin-bottom: 5px; }
.solo-note { font-size: 11px; color: var(--sage); background: var(--sage-light); padding: 3px 8px; border-radius: 4px; margin-bottom: 7px; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.tag-fish { background: var(--fish); color: var(--fish-text); }
.tag-veg { background: var(--veg); color: var(--veg-text); }
.tag-freeze { background: var(--freeze); color: var(--freeze-text); }
.tag-fridge { background: #F7EFF7; color: #6B3D8A; }
.recipe-btn-inline { background: none; border: none; font-size: 11px; color: var(--sage); cursor: pointer; padding: 0; font-family: "Roboto", sans-serif; display: inline-flex; align-items: center; gap: 3px; margin-bottom: 2px; }
.recipe-btn-inline:hover { text-decoration: underline; }
.divider { border: none; border-top: 1px solid var(--border); margin: 9px 0; }
.card-actions { display: flex; gap: 5px; margin-top: 8px; }
.action-btn { flex: 1; font-size: 11px; padding: 5px 4px; border-radius: 5px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-family: "Roboto", sans-serif; color: var(--muted); transition: all 0.12s; }
.action-btn:hover { background: var(--sage-light); color: var(--sage); border-color: var(--sage-mid); }

.section-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 1.25rem 1.5rem 0.6rem; }
.batch-list { margin: 0 1.5rem; background: white; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.batch-item { padding: 9px 13px; font-size: 13px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 9px; }
.batch-item:last-child { border-bottom: none; }

/* DISHES TAB */
.dishes-panel { padding: 0 1.5rem; }
.dish-group-title { font-size: 13px; font-weight: 500; color: var(--ink); margin: 1.25rem 0 0.6rem; display: flex; align-items: center; gap: 6px; }
.dish-group-avatar { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
.dish-group-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.recipe-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; margin-bottom: 7px; display: flex; align-items: flex-start; gap: 12px; }
.recipe-info { flex: 1; min-width: 0; }
.recipe-name { font-family: "Roboto Slab", serif; font-size: 14px; font-weight: 400; margin-bottom: 4px; }
.recipe-desc { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-style: italic; line-height: 1.5; }
.recipe-ingredients { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.recipe-ingredients span { display: inline-block; background: var(--cream); border-radius: 4px; padding: 1px 6px; margin: 2px 2px 0 0; }
.recipe-url-link { font-size: 11px; color: var(--sage); text-decoration: none; }
.recipe-url-link:hover { text-decoration: underline; }
.recipe-actions { display: flex; gap: 5px; flex-shrink: 0; padding-top: 2px; }

/* FORM */
.form-card { background: white; border: 1px solid var(--sage-mid); border-radius: 10px; padding: 16px; margin-bottom: 1rem; }
.form-card h3 { font-family: "Roboto Slab", serif; font-size: 16px; font-weight: 400; margin-bottom: 14px; }
.form-row { margin-bottom: 11px; }
.form-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; display: block; }
.form-hint { font-size: 11px; color: var(--muted); margin-top: 3px; font-style: italic; }
.form-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-family: "Roboto", sans-serif; font-size: 13px; color: var(--ink); background: var(--cream); outline: none; transition: border 0.15s; }
.form-input:focus { border-color: var(--sage-mid); background: white; }
.tag-toggles { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-toggle { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 11px; font-weight: 500; cursor: pointer; background: white; color: var(--muted); transition: all 0.12s; font-family: "Roboto", sans-serif; }
.tag-toggle.on-fisk { background: var(--fish); color: var(--fish-text); border-color: var(--fish-text); }
.tag-toggle.on-vegetar { background: var(--veg); color: var(--veg-text); border-color: var(--veg-text); }
.tag-toggle.on-frys { background: var(--freeze); color: var(--freeze-text); border-color: var(--freeze-text); }
.tag-toggle.on-kjøleskap { background: #F7EFF7; color: #6B3D8A; border-color: #6B3D8A; }
.form-actions { display: flex; gap: 8px; margin-top: 14px; }

/* MODAL */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(30,34,24,0.45); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-bg.open { display: flex; }
.modal { background: white; border-radius: 12px; padding: 1.5rem; max-width: 440px; width: 100%; max-height: 85vh; overflow-y: auto; }
.modal h3 { font-family: "Roboto Slab", serif; font-size: 18px; font-weight: 400; margin-bottom: 0.4rem; }
.modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 1rem; }
.modal-desc { font-size: 13px; color: var(--ink); font-style: italic; margin-bottom: 1rem; line-height: 1.6; padding: 10px 12px; background: var(--sage-light); border-radius: 7px; }
.modal-ing-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.modal-ingredients { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.2rem; }
.modal-ingredients span { background: var(--cream); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--ink); }
.modal-url { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--sage); text-decoration: none; padding: 8px 14px; border: 1px solid var(--sage-mid); border-radius: 6px; }
.modal-url:hover { background: var(--sage-light); }
.modal-actions { display: flex; gap: 8px; margin-top: 1.2rem; }
.swap-list { list-style: none; }
.swap-item { padding: 9px 11px; border: 1px solid var(--border); border-radius: 7px; margin-bottom: 5px; cursor: pointer; font-size: 13px; transition: all 0.12s; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.swap-item:hover { background: var(--sage-light); border-color: var(--sage-mid); }
.share-box { margin: 0.5rem 1.5rem 0; background: white; border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.share-box h4 { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
.share-url { font-size: 11px; color: var(--muted); white-space: pre-line; background: var(--cream); padding: 8px; border-radius: 5px; margin-bottom: 8px; }
.hidden { display: none; }

/* MOBILE IMPROVEMENTS */
@media (max-width: 500px) {
  .header { padding: 1rem; }
  .header-text h1 { font-size: 18px; }
  .avatar { width: 36px; height: 36px; }
  .family-icons { gap: 7px; }
  .tabs { padding: 0 1rem; }
  .tab { padding: 10px 12px; font-size: 12px; }
  .toolbar { padding: 0.75rem 1rem; gap: 6px; }
  .btn-primary, .btn-secondary { padding: 8px 12px; font-size: 12px; }
  .fridge-bar { margin: 0 1rem 0.75rem; }
  .week-grid { padding: 0 1rem; grid-template-columns: 1fr; gap: 8px; }
  .day-card { padding: 12px; }
  .dishes-panel { padding: 0 1rem; }
  .recipe-card { flex-direction: column; gap: 8px; }
  .recipe-actions { flex-direction: row; }
  .form-card { padding: 14px; }
  .batch-list { margin: 0 1rem; }
  .section-title { padding: 1rem 1rem 0.5rem; }
  .share-box { margin: 0.5rem 1rem 0; }
  .modal { padding: 1.2rem; }
}
@media (max-width: 380px) {
  .week-grid { grid-template-columns: 1fr; }
  .header-text h1 { font-size: 16px; }
}
/* Tap targets for mobile */
@media (hover: none) {
  .action-btn { padding: 8px 4px; font-size: 12px; }
  .presence-btn { width: 32px; height: 32px; }
  .recipe-btn-inline { padding: 4px 0; }
}

</style>

  {id:110, name:"Fishcakes og gulrøtter", tags:["fisk"], desc:"Fiskekaker i panne med rå gulrøtter.", ingredients:"fiskekaker, gulrøtter", url:"", freeze:false},
  {id:111, name:"Brød med ost", tags:[], desc:"Ristet brød med smør og ost.", ingredients:"brød, smør, ost", url:"", freeze:false},
];

let nextAdultId=25, nextKidId=112;
let currentWeek=[], presence={}, editingId=null, editingType=null;

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",(i===0&&tab==="plan")||(i===1&&tab==="dishes")));
  document.getElementById("tab-plan").classList.toggle("hidden",tab!=="plan");
  document.getElementById("tab-dishes").classList.toggle("hidden",tab!=="dishes");
  if(tab==="dishes") renderDishesTab();
}

function getDateOffset(o){const d=new Date();d.setDate(d.getDate()+o);return d;}
function fmtDate(d){return d.getDate()+". "+MONTHS[d.getMonth()];}
function pickRandom(arr){return arr[Math.floor(Math.random()*arr.length)];}

function tagBadges(tags){
  return tags.map(t=>{
    if(t==="fisk") return '<span class="tag tag-fish">fisk</span>';
    if(t==="vegetar") return '<span class="tag tag-veg">vegetar</span>';
    if(t==="frys") return '<span class="tag tag-freeze">frys</span>';
    if(t==="kjøleskap") return '<span class="tag tag-fridge">kjøleskap</span>';
    return "";
  }).join("");
}

function generateWeek(){
  const btn=document.getElementById("btn-generate");
  btn.disabled=true; btn.textContent="Genererer...";
  document.getElementById("share-section").innerHTML="";
  presence={};
  const fridge=document.getElementById("fridge-input").value.toLowerCase();
  const shuffled=[...adultDishes].sort(()=>Math.random()-0.5);
  const week=[]; let fishCount=0,freezeCount=0;
  for(let d=0;d<7;d++){
    const date=getDateOffset(d),dayIdx=date.getDay(),isFriday=dayIdx===5;
    let adult;
    if(isFriday) adult=adultDishes.find(r=>r.name.toLowerCase().includes("taco"));
    if(!adult){
      adult=shuffled.find(r=>{
        if(week.some(w=>w.adult.id===r.id)) return false;
        if(r.tags.includes("fisk")&&fishCount>=2) return false;
        if(r.tags.includes("frys")&&freezeCount>=2) return false;
        if(fridge.trim()&&d<2&&r.tags.includes("kjøleskap")) return true;
        return true;
      })||shuffled.find(r=>!week.some(w=>w.adult.id===r.id))||pickRandom(shuffled);
    }
    if(adult.tags.includes("fisk")) fishCount++;
    if(adult.tags.includes("frys")) freezeCount++;
    const kid=pickRandom(kidDishes);
    presence[d]={adam:true,cathrine:true};
    week.push({adult,kid,dayIdx,date,offset:d,isToday:d===0});
  }
  currentWeek=week; renderWeek();
  btn.disabled=false; btn.textContent="Generer ny uke ↻";
}

function togglePresence(offset,person){presence[offset][person]=!presence[offset][person];renderWeek();}

function getSoloNote(offset){
  const p=presence[offset];
  if(!p.adam&&!p.cathrine) return null;
  if(!p.adam) return "Bare Cathrine — enkel porsjon";
  if(!p.cathrine) return "Bare Adam — enkel vegetarrett";
  return null;
}

function showRecipePopup(id, type) {
  const pool = type==="adult" ? adultDishes : kidDishes;
  const r = pool.find(x=>x.id===id);
  if(!r) return;
  const ings = r.ingredients ? r.ingredients.split(",").map(s=>s.trim()).filter(Boolean) : [];
  let html = `<h3>${r.name}</h3>`;
  if(r.desc) html += `<div class="modal-desc">${r.desc}</div>`;
  if(ings.length>0){
    html += `<div class="modal-ing-title">Hovedingredienser</div>`;
    html += `<div class="modal-ingredients">${ings.map(i=>`<span>${i}</span>`).join("")}</div>`;
  }
  if(r.url) html += `<a class="modal-url" href="${r.url}" target="_blank">↗ Åpne full oppskrift</a>`;
  html += `<div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">Lukk</button></div>`;
  document.getElementById("modal-content").innerHTML=html;
  openModal();
}

function renderWeek(){
  const freezeMeals=currentWeek.filter(m=>m.adult.freeze);
  let html='<div class="week-grid">';
  currentWeek.forEach((day,i)=>{
    const p=presence[day.offset],solo=getSoloNote(day.offset);
    const a=day.adult,k=day.kid;
    const hasAdultInfo = a.desc||a.ingredients||a.url;
    const hasKidInfo = k.desc||k.ingredients||k.url;
    html+=`<div class="day-card${day.isToday?" today":""}">
      <div class="day-header">
        <div class="day-info">
          <div class="day-name">${day.isToday?'<span class="today-dot"></span>':''}${DAYS[day.dayIdx]}</div>
          <div class="day-date">${fmtDate(day.date)}</div>
        </div>
        <div class="presence-row">
          <button class="presence-btn ${p.cathrine?"present":"away"}" onclick="togglePresence(${day.offset},'cathrine')"><img src="${C_IMG}"></button>
          <button class="presence-btn ${p.adam?"present":"away"}" onclick="togglePresence(${day.offset},'adam')"><img src="${A_IMG}"></button>
        </div>
      </div>
      ${solo?`<div class="solo-note">${solo}</div>`:""}
      <div class="meal-section">
        <div class="meal-section-label">
          <div class="meal-avatar-small"><img src="${C_IMG}"></div>
          <div class="meal-avatar-small" style="margin-left:-5px"><img src="${A_IMG}"></div>
          Voksne
        </div>
        <div class="meal-name">${a.name}</div>
        <div class="tags">${tagBadges(a.tags)}</div>
        ${hasAdultInfo?`<button class="recipe-btn-inline" onclick="showRecipePopup(${a.id},'adult')">↗ Oppskrift</button>`:""}
      </div>
      <hr class="divider">
      <div class="meal-section">
        <div class="meal-section-label">
          <div class="meal-avatar-small"><img src="${X_IMG}"></div>
          Alexzander
        </div>
        <div class="meal-name-kid">${k.name}</div>
        <div class="tags">${tagBadges(k.tags)}</div>
        ${hasKidInfo?`<button class="recipe-btn-inline" onclick="showRecipePopup(${k.id},'kid')">↗ Oppskrift</button>`:""}
      </div>
      <div class="card-actions">
        <button class="action-btn" onclick="swapMeal(${i},'adult')">Bytt voksen</button>
        <button class="action-btn" onclick="swapMeal(${i},'kid')">Bytt barn</button>
      </div>
    </div>`;
  });
  html+="</div>";
  if(freezeMeals.length>0){
    html+='<div class="section-title">Frys-plan</div><div class="batch-list">';
    freezeMeals.forEach(m=>{html+=`<div class="batch-item"><span>❄</span><span>Dobbel porsjon av <strong>${m.adult.name}</strong> — frys halvparten</span></div>`;});
    html+=`<div class="batch-item"><span>✓</span><span>${freezeMeals.length*2}–${freezeMeals.length*3} middager i reserve</span></div></div>`;
  }
  document.getElementById("main-content").innerHTML=html;
}

function swapMeal(idx,type){
  const day=currentWeek[idx];
  const pool=type==="adult"?adultDishes:kidDishes;
  const currentId=type==="adult"?day.adult.id:day.kid.id;
  const available=pool.filter(r=>r.id!==currentId);
  const label=type==="adult"?"voksenrett":"barnerett";
  let listHtml=available.map(r=>`<li class="swap-item" onclick="selectSwap(${idx},'${type}',${r.id})"><span>${r.name}</span><span style="display:flex;gap:4px">${tagBadges(r.tags)}</span></li>`).join("");
  document.getElementById("modal-content").innerHTML=`<h3>Bytt ${label}</h3><div class="modal-sub">${DAYS[day.dayIdx]} ${fmtDate(day.date)}</div><ul class="swap-list">${listHtml}</ul><div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">Avbryt</button></div>`;
  openModal();
}
function selectSwap(weekIdx,type,id){
  const pool=type==="adult"?adultDishes:kidDishes;
  const dish=pool.find(r=>r.id===id);
  if(type==="adult") currentWeek[weekIdx].adult=dish;
  else currentWeek[weekIdx].kid=dish;
  closeModal(); renderWeek();
}

function shareWeek(){
  const lines=currentWeek.map(d=>{
    const p=presence[d.offset];
    const who=!p.adam&&!p.cathrine?"":!p.adam?" (bare Cathrine)":!p.cathrine?" (bare Adam)":"";
    return `${DAYS[d.dayIdx]} ${fmtDate(d.date)}:\n  Voksne: ${d.adult.name}${who}\n  Alexzander: ${d.kid.name}`;
  }).join("\n");
  if(navigator.share){navigator.share({title:"Ukens middagsplan",text:lines}).catch(()=>showShareFallback(lines));}
  else showShareFallback(lines);
}
function showShareFallback(text){
  document.getElementById("share-section").innerHTML=`<div class="share-box"><h4>Del ukeplan</h4><div class="share-url">${text}</div><button class="btn-secondary" onclick="navigator.clipboard.writeText(document.querySelector('.share-url').innerText).then(()=>this.textContent='Kopiert! ✓')">Kopier</button></div>`;
}

// ── DISHES TAB ─────────────────────────────────────────────────
function renderDishesTab(){
  document.getElementById("form-container").innerHTML="";
  editingId=null; editingType=null;

  const makeList=(dishes,type,groupHtml)=>{
    let h=groupHtml;
    dishes.forEach(r=>{
      const ings=r.ingredients?r.ingredients.split(",").map(s=>s.trim()).filter(Boolean):[];
      h+=`<div class="recipe-card">
        <div class="recipe-info">
          <div class="recipe-name">${r.name}</div>
          ${r.desc?`<div class="recipe-desc">${r.desc}</div>`:""}
          ${ings.length>0?`<div class="recipe-ingredients">${ings.map(i=>`<span>${i}</span>`).join("")}</div>`:""}
          <div class="tags" style="margin-top:5px">${tagBadges(r.tags)}</div>
          ${r.url?`<a class="recipe-url-link" href="${r.url}" target="_blank">↗ Oppskrift</a>`:""}
        </div>
        <div class="recipe-actions">
          <button class="btn-icon" onclick="showEditForm('${type}',${r.id})">Rediger</button>
          <button class="btn-danger" onclick="deleteDish('${type}',${r.id})">Slett</button>
        </div>
      </div>`;
    });
    return h;
  };

  const adultHeader=`<div class="dish-group-title"><div class="dish-group-avatar"><img src="${C_IMG}"></div><div class="dish-group-avatar" style="margin-left:-6px"><img src="${A_IMG}"></div>&nbsp;Voksenretter (${adultDishes.length})</div>`;
  const kidHeader=`<div class="dish-group-title"><div class="dish-group-avatar"><img src="${X_IMG}"></div>&nbsp;Barneretter (${kidDishes.length})</div>`;

  document.getElementById("adult-list").innerHTML=makeList(adultDishes,"adult",adultHeader);
  document.getElementById("kid-list").innerHTML=makeList(kidDishes,"kid",kidHeader);
}

const ADULT_TAGS=["fisk","vegetar","frys","kjøleskap"];
const KID_TAGS=["fisk"];

function showAddForm(type){editingId=null;editingType=type;renderForm({name:"",desc:"",ingredients:"",url:"",tags:[],freeze:false},type,"Legg til rett");document.getElementById("form-container").scrollIntoView({behavior:"smooth"});}
function showEditForm(type,id){
  editingType=type;
  const pool=type==="adult"?adultDishes:kidDishes;
  const r=pool.find(x=>x.id===id);
  editingId=id;
  renderForm(r,type,"Lagre endringer");
  document.getElementById("form-container").scrollIntoView({behavior:"smooth"});
}

function renderForm(r,type,btnLabel){
  const isAdult=type==="adult";
  const tagList=isAdult?ADULT_TAGS:KID_TAGS;
  const title=editingId?(isAdult?"Rediger voksenrett":"Rediger barnerett"):(isAdult?"Ny voksenrett":"Ny barnerett");
  const toggles=tagList.map(t=>{const on=r.tags&&r.tags.includes(t);return `<button type="button" class="tag-toggle${on?" on-"+t:""}" id="tog-${t}" onclick="toggleFormTag('${t}')">${t}</button>`;}).join("");
  document.getElementById("form-container").innerHTML=`
    <div class="form-card">
      <h3>${title}</h3>
      <div class="form-row">
        <label class="form-label">Navn på retten</label>
        <input class="form-input" id="f-name" placeholder="f.eks. Laks med teriyaki og ris" value="${r.name||""}">
      </div>
      <div class="form-row">
        <label class="form-label">Én setning om tilberedning</label>
        <input class="form-input" id="f-desc" placeholder="f.eks. Stekes raskt i panne med soyasaus og honning, serveres over ris." value="${r.desc||""}">
        <div class="form-hint">Vises som en liten beskrivelse i oppskrift-popupen på ukeplanen.</div>
      </div>
      <div class="form-row">
        <label class="form-label">Hovedingredienser</label>
        <input class="form-input" id="f-ing" placeholder="f.eks. laks, soyasaus, honning, ingefær, ris" value="${r.ingredients||""}">
        <div class="form-hint">Kommaseparert liste — vises som tags i popupen.</div>
      </div>
      <div class="form-row">
        <label class="form-label">Oppskrift-URL (valgfritt)</label>
        <input class="form-input" id="f-url" placeholder="https://..." value="${r.url||""}">
      </div>
      ${tagList.length>0?`<div class="form-row"><label class="form-label">Tags</label><div class="tag-toggles">${toggles}</div></div>`:""}
      <div class="form-actions">
        <button class="btn-primary" onclick="saveForm()">${btnLabel}</button>
        <button class="btn-secondary" onclick="cancelForm()">Avbryt</button>
      </div>
    </div>`;
}

function toggleFormTag(t){const btn=document.getElementById("tog-"+t);btn.classList.toggle("on-"+t);}
function getFormTags(type){return(type==="adult"?ADULT_TAGS:KID_TAGS).filter(t=>{const b=document.getElementById("tog-"+t);return b&&b.classList.contains("on-"+t);});}

function saveForm(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){alert("Skriv inn navn på retten.");return;}
  const desc=document.getElementById("f-desc").value.trim();
  const ingredients=document.getElementById("f-ing").value.trim();
  const url=(document.getElementById("f-url")||{}).value||"";
  const tags=getFormTags(editingType);
  const freeze=tags.includes("frys");
  const pool=editingType==="adult"?adultDishes:kidDishes;
  if(editingId){const idx=pool.findIndex(r=>r.id===editingId);pool[idx]={...pool[idx],name,desc,ingredients,url,tags,freeze};}
  else{const newId=editingType==="adult"?nextAdultId++:nextKidId++;pool.push({id:newId,name,desc,ingredients,url,tags,freeze});}
  renderDishesTab();
}
function cancelForm(){document.getElementById("form-container").innerHTML="";editingId=null;}
function deleteDish(type,id){
  if(!confirm("Vil du slette denne retten?")) return;
  if(type==="adult") adultDishes=adultDishes.filter(r=>r.id!==id);
  else kidDishes=kidDishes.filter(r=>r.id!==id);
  renderDishesTab();
}


function exportHTML() {
  // Serialise current dish data
  const adultJSON = JSON.stringify(adultDishes);
  const kidJSON   = JSON.stringify(kidDishes);

  // Grab the full current HTML
  let src = document.documentElement.outerHTML;

  // Replace the dish array initialisers with current live data
  src = src.replace(
    /let adultDishes\s*=\s*\[[\s\S]*?\];(?=\s*\n)/,
    'let adultDishes = ' + adultJSON + ';'
  );
  src = src.replace(
    /let kidDishes\s*=\s*\[[\s\S]*?\];(?=\s*\n)/,
    'let kidDishes = ' + kidJSON + ';'
  );

  const blob = new Blob([src], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'middagsplanlegger.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function openModal(){document.getElementById("modal-bg").classList.add("open");}
function closeModal(){document.getElementById("modal-bg").classList.remove("open");}
document.getElementById("modal-bg").addEventListener("click",e=>{if(e.target===document.getElementById("modal-bg"))closeModal();});

generateWeek();
</script>
</body>
</html>
